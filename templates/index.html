<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mecha Vehicle Monitoring</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="main-dashboard">
    <div class="ui-grid">

        <div class="ui-card">
            <div class="card-header">RPM Meter</div>
            <div class="circular-gauge-container">
                <svg viewBox="0 0 100 100" class="gauge-svg">
                    <path d="M 20.3 79.7 A 42 42 0 0 1 79.7 20.3" class="arc-cyan" />
                    <path d="M 79.7 20.3 A 42 42 0 0 1 79.7 79.7" class="arc-red" />
                </svg>
                <div class="ticks">
                    <div class="tick" style="--deg: -135deg;"></div>
                    <div class="tick" style="--deg: -112.5deg;"></div>
                    <div class="tick" style="--deg: -90deg;"></div>
                    <div class="tick" style="--deg: -67.5deg;"></div>
                    <div class="tick" style="--deg: -45deg;"></div>
                    <div class="tick" style="--deg: -22.5deg;"></div>
                    <div class="tick" style="--deg: 0deg;"></div>
                    <div class="tick" style="--deg: 22.5deg;"></div>
                    <div class="tick" style="--deg: 45deg;"></div>
                    <div class="tick red-tick" style="--deg: 67.5deg;"></div>
                    <div class="tick red-tick" style="--deg: 90deg;"></div>
                    <div class="tick red-tick" style="--deg: 112.5deg;"></div>
                    <div class="tick red-tick" style="--deg: 135deg;"></div>
                </div>
                <div class="numbers rpm-numbers">
                    <span style="bottom: 20%; left: 23%;">0</span>
                    <span style="top: 50%; left: 15%; transform: translateY(-50%);">1</span>
                    <span style="top: 25%; left: 25%;">2</span>
                    <span style="top: 15%; left: 50%; transform: translateX(-50%);">3</span>
                    <span style="top: 25%; right: 25%;">4</span>
                    <span style="top: 50%; right: 15%; transform: translateY(-50%);">5</span>
                </div>
                <div class="needle-wrapper" id="rpmNeedle">
                    <div class="needle-arm"></div>
                    <div class="needle-pivot"></div>
                </div>
            </div>
            <div class="gauge-label">1/min x 1000</div>
        </div>

        <div class="ui-card">
            <div class="card-header"></div>
            <div class="circular-gauge-container">
                <svg viewBox="0 0 100 100" class="gauge-svg">
                    <path d="M 20.3 79.7 A 42 42 0 1 1 79.7 79.7" class="arc-track" />
                    <path d="M 20.3 79.7 A 42 42 0 1 1 79.7 79.7" class="arc-cyan fill-speed" id="speedSvgBar" stroke-dasharray="198" stroke-dashoffset="198" />
                </svg>
                <div class="ticks">
                    <div class="tick" style="--deg: -135deg;"></div>
                    <div class="tick" style="--deg: -112.5deg;"></div>
                    <div class="tick" style="--deg: -90deg;"></div>
                    <div class="tick" style="--deg: -67.5deg;"></div>
                    <div class="tick" style="--deg: -45deg;"></div>
                    <div class="tick" style="--deg: -22.5deg;"></div>
                    <div class="tick" style="--deg: 0deg;"></div>
                    <div class="tick" style="--deg: 22.5deg;"></div>
                    <div class="tick" style="--deg: 45deg;"></div>
                    <div class="tick" style="--deg: 67.5deg;"></div>
                    <div class="tick" style="--deg: 90deg;"></div>
                    <div class="tick" style="--deg: 112.5deg;"></div>
                    <div class="tick" style="--deg: 135deg;"></div>
                </div>
                <div class="numbers speed-numbers">
                    <span style="bottom: 20%; left: 23%;">0</span>
                    <span style="top: 50%; left: 12%; transform: translateY(-50%);">20</span>
                    <span style="top: 25%; left: 22%;">40</span>
                    <span style="top: 25%; right: 22%;">60</span>
                    <span style="top: 50%; right: 12%; transform: translateY(-50%);">80</span>
                    <span style="bottom: 20%; right: 18%;">120</span>
                </div>
                <div class="needle-wrapper" id="speedNeedle">
                    <div class="needle-arm"></div>
                    <div class="needle-pivot"></div>
                </div>
            </div>
            <div class="gauge-label speed-label">km/h</div>
        </div>

        <div class="ui-card">
            <div class="card-header">Fuel Level</div>
            <div class="linear-gauge-container">
                <svg class="icon fuel-icon" viewBox="0 0 24 24">
                    <path d="M19.5 8.5v-1a2.5 2.5 0 0 0-5 0v1a2.5 2.5 0 0 0 1.28 2.18l-.28 5.32h-1.5V4h-10v16h12v-3.5h1.5v3.5h2v-8h-1.28a2.5 2.5 0 0 0 1.28-2.18zM17 7.5a1 1 0 1 1-1-1 1 1 0 0 1 1 1zm-11 11V6h6v12.5H6z"/>
                </svg>
                <div class="linear-wrapper">
                    <div class="linear-track">
                        <div class="linear-fill cyan-bg" id="fuelBar" style="width: 60%;"></div>
                    </div>
                    <div class="linear-ticks">
                        <span>E</span>
                        <span>|</span>
                        <span>|</span>
                        <span>|</span>
                        <span>F</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="ui-card">
            <div class="card-header">Engine Temperature</div>
            <div class="linear-gauge-container">
                <svg class="icon temp-icon" viewBox="0 0 24 24">
                    <path d="M15 13V5a3 3 0 0 0-6 0v8a5 5 0 1 0 6 0zm-3-9a1 1 0 0 1 1 1v4h-2V5a1 1 0 0 1 1-1zm1 12.5a2 2 0 1 1-2-2V11h2v3.5z"/>
                </svg>
                <div class="linear-wrapper">
                    <div class="linear-track">
                        <div class="linear-fill cyan-bg" id="tempBar" style="width: 50%;"></div>
                    </div>
                    <div class="linear-ticks">
                        <span>C</span>
                        <span>|</span>
                        <span>|</span>
                        <span>|</span>
                        <span>H</span>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
